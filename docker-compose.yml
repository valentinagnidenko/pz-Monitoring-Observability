version: "3.8"

services:
  web:
    image: nginx
    volumes:
      - ./services/web:/usr/share/nginx/html
    ports:
      - "8080:80"

  webapi:
    build: ./services/webapi
    ports:
      - "3000:3000"

  mqtt:
    image: eclipse-mosquitto
    ports:
      - "1883:1883"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"